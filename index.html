<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Sign-Up Form</title>
</head>

<body>
    <div class="side-section">
        <div class="logo-container">
            <img src="./odin-lined.png" alt="Odin head lined logo">
            <p>ODIN</p>
        </div>
        <p>Photo by <a href="https://unsplash.com/es/@haliewestphoto">Halie West</a> on <a
                href="https://unsplash.com/es/fotos/planta-de-hoja-verde-en-fotografia-de-primer-plano-25xggax4bSA">Unsplash</a>
        </p>
    </div>
    <main class="main-section">
        <div>
            <p>This is not a real online service! You know you need something<br>like this in your life to help you
                realize your deepest dreams.<br>Sign up <em>now</em> to get started.</p>
            <p>You <i>know</i> you want to.</p>
        </div>
        <form action="">
            <div>
                <p>Let's do this!</p>

                <div>
                    <div>
                        <label for="first_name">FIRST NAME</label>
                        <input type="text" name="first_name" id="first_name">
                    </div>
                    <div>
                        <label for="last_name">LAST NAME</label>
                        <input type="text" name="last_name" id="last_name">
                    </div>
                </div>

                <div>
                    <div>
                        <label for="email">EMAIL</label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div>
                        <label for="phone_number">PHONE NUMBER</label>
                        <input type="text" name="phone_number" id="phone_number">
                    </div>

                </div>
                <div>
                    <div>
                        <label for="password">PASSWORD</label>
                        <input type="password" name="password" id="password">
                    </div>
                    <div>
                        <label for="confirm_password">CONFIRM PASSWORD</label>
                        <input type="password" name="confirm_password" id="confirm_password">
                    </div>
                </div>
            </div>
            <button type="submit">Create Account</button>
        </form>
        <p>Already have an account? <a href="">Log in</a></p>
    </main>
</body>

</html>
